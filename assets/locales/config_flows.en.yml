en:
  default:
    database:
      name: "Database"
      message: "Select database"
      description: "Database that flow uses."
    video_modules:
      name: "Video modules"
      message: "Select video modules"
      description: "Video modules that flow uses. (Space - toggle, Enter - confirm)"
    gen_amount:
      name: "Generations amount"
      message: "Enter generations amount"
      description: "Amount of generations for flow."
    prompt:
      name: "Prompt"
      message: "Enter prompt"
      description: "Prompt that flow uses."
    upscale:
      name: "Upscale"
      message: "Upscale or not"
      description: "Should program upscale images?"
    one_video_per_photo:
      name: "One Video per Photo"
      message: "One video per photo"
      description: "Whether to generate only one video from each photo. If set to 'No', all video modules will generate a video from each photo. If set to 'Yes', only one video module will be used per photo."
    one_video_per_prompt:
      name: "One Video per Prompt"
      message: "One video per photo"
      description: "Whether to generate only one video from each prompt. If set to 'No', all video modules will generate a video from each prompt. If set to 'Yes', only one video module will be used per prompt."
    additional_metadata:
      name: "Additional Metadata"
      message: "Additional metadata"
      description: "Whether flow should additionally generate metadata for additional photos."

  GenerateVideosFromPrompts:
    name: "Videos from prompts"
    choice: "Video from prompts"
    progress_bar: "Videos generation"
    progress_unit: "prompt"

  GenerateVideosFromPhotos:
    name: "Videos from photos"
    choice: "Video from photos"
    progress_bar: "Videos generation"
    progress_unit: "photo"

  GeneratePhotosFromPrompts:
    name: "Photo from prompts"
    choice: "Photo from prompts"
    progress_bar: "Photos generation"
    progress_unit: "prompt"

  ParaphrasePrompts:
    name: "Paraphrase prompts"
    choice: "Paraphrase prompts"
    pre_template:
      name: "Template for GPT"
      message: "Enter template for GPT"
      description: "Preprocessing prompt. It must contain {prompt} - where goes original prompt. It should contain instruction for GPT, that it must return JSON-code with only one parameter - prompt"
    post_template:
      name: "Final template"
      message: "Enter final template"
      description: "Postprocessing prompt. It must contain {prompt} - where goes paraphrased prompt."
    progress_bar: "Prompt paraphrasing"
    progress_unit: "prompt"

  GenerateMetadata:
    name: "Generate metadata"
    choice: "Generate metadata"
    gpt_template:
      name: "Template for GPT"
      message: "Enter template for GPT"
      description: "Preprocessing prompt. It must contain {keywords_amount} - where goes amount of keywords to generate. It should contain instruction for GPT, that it must return JSON-code with these parameters: \"description\", \"keywords\"."
    openai_gpt:
      name: "Use OpenAI GPT"
      message: "Whether flow should use OpenAI GPT"
      description: "If yes, flow will use official OpenAI GPT, else it will use SyntxAI GPT."
    progress_bar: "Metadata generation"
    progress_unit: "photo"


  GeneratePromptsPhotosVideos:
    name: "Photo from prompts, video from photos"
    choice: "Photo from prompts, video from photos"
    progress_bar: "Photo and video generation"
    progress_unit: "prompt"

  progress_bar:
    successful: "✅ Success"
    errors: "❌ Errors"
    processing: "🔄 Processing"
    queue: "⏳ Queue"
    premade: "📀 Premade"