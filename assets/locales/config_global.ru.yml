ru:
  default:
    telegram_account:
      name: "Аккаунт Telegram"
      message: "Введите номер телефона вашего аккаунта Telegram"
      description: "Возможно, позже вам понадобится ввести код подтверждения."
    notify_account:
      name: "Аккаунт для уведомлений"
      message: "Введите ID аккаунта Telegram, куда нужно присылать уведомления"
      description: "StockFlow уведомит вас в случае возникновения критической ошибки. Оставьте поле пустым, чтобы отключить уведомления."
    notify_on_critical:
      name: "Уведомлять при критической ошибке"
      message: "Должен ли StockFlow писать сообщение при возникновении критической ошибки"
      description: "Вам нужно будет перезапустить программу, чтобы применить эту настройку."
    notify_on_end:
      name: "Уведомлять при успешном завершении"
      message: "Должен ли StockFlow писать сообщение при успешном завершении сценария"
      description: "Вам нужно будет перезапустить программу, чтобы применить эту настройку."
    delay_normal:
      name: "Обычная задержка"
      message: "Введите кол-во секунд обычной задержки"
      description: "Обычно задержка перед отправкой сообщения будет введённое кол-во секунд."
    delay_spread:
      name: "Разброс задержки"
      message: "Введите разброс задержки в секундах"
      description: "Задержка будет отклонятся от среднего на такое количество секунд (Гауссовское распределение)."

  GlobalSettings:
    name: "Глобальные"
    choice: "🌐 Глобальные"
